name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build, test, and docs
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.pull_request.base.ref == 'main' &&
        (
          (
            github.event_name == 'pull_request' &&
            contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.pull_request.author_association)
          ) ||
          (
            github.event_name == 'pull_request_review' &&
            github.event.review.state == 'approved' &&
            contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.review.author_association)
          )
        )
      }}

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features

      - name: Build crates and examples
        run: cargo build --workspace --all-targets --all-features

      - name: Test crates
        run: cargo test --workspace --all-targets --all-features

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build book
        run: mdbook build book
