name: Book

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/book.yml
      - book/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build book
        run: mdbook build book
      - name: Archive book output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: book
          path: book/book

  deploy:
    needs: build
    if: github.repository == 'danielkov/agentkit' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: pages
      cancel-in-progress: true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build book
        run: mdbook build book
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
